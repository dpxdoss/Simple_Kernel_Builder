name: Build Kernel

on:
  workflow_dispatch:
    inputs:
      kernel_source:
        description: 'Kernel Source Link'
        required: true
        default: 'https://github.com/dpxdoss/android_kernel_realme_RMX2020.git'
      kernel_branch:
        description: 'Kernel Branch'
        required: true
        default: '16.0-KSU'
      clang_url:
        description: 'Clang Source Link'
        required: true
        default: 'https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/tags/android-14.0.0_r50/clang-r510928.tar.gz'
      ak3_source:
        description: 'AnyKernel Link'
        required: true
        default: 'https://github.com/dpxdoss/AnyKernel3.git'
      ak3_branch:
        description: 'AnyKernel Branch'
        required: true
        default: 'RMX2020'
      ksu_source:
        description: 'KernelSU Setup Link (Optional)'
        required: false
        default: 'https://raw.githubusercontent.com/backslashxx/KernelSU/refs/heads/master/kernel/setup.sh'
      ksu_branch:
        description: 'KernelSU Branch (Optional)'
        required: false
        default: 'master'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y git gnupg flex bison build-essential zip curl zlib1g-dev \
          gcc-multilib g++-multilib libc6-dev-i386 libncurses-dev x11proto-core-dev \
          libx11-dev lib32z1-dev libgl1-mesa-dev libxml2-utils xsltproc unzip fontconfig \
          python3 python3-pip libssl-dev bc lua5.3 git-lfs
          sudo ln -sf /usr/bin/python3 /usr/bin/python
          git lfs install

      - name: Cloning Kernel
        run: |
          git clone --depth=1 -b ${{ github.event.inputs.kernel_branch }} ${{ github.event.inputs.kernel_source }} kernel-source
          echo "LATEST_COMMIT=$(git -C kernel-source rev-parse HEAD)" >> $GITHUB_ENV
          echo "SHORT_COMMIT=$(git -C kernel-source rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Cloning Clang
        run: |
          mkdir -p clang
          if [[ "${{ github.event.inputs.clang_url }}" == *.tar.gz ]]; then
            curl -LO "${{ github.event.inputs.clang_url }}"
            tar -xf *.tar.gz -C clang
          else
            git clone --depth=1 ${{ github.event.inputs.clang_url }} clang
          fi
          [ -d "clang/.git" ] && cd clang && git lfs pull || true

      - name: Building Kernel
        run: |
          cd kernel-source
          
          # 1. Fetch LocalVersion from Defconfig
          # This grabs the value, removes quotes, and removes a leading '-' if present
          LV_NAME=$(grep "CONFIG_LOCALVERSION=" arch/arm64/configs/RMX2020_defconfig | cut -d '"' -f2 | sed 's/^-//')
          [ -z "$LV_NAME" ] && LV_NAME="Kernel"
          echo "LV_NAME=$LV_NAME" >> $GITHUB_ENV

          # 2. Integrate KSU & Fetch Version
          if [ ! -z "${{ github.event.inputs.ksu_source }}" ]; then
              curl -LSs "${{ github.event.inputs.ksu_source }}" | bash -s ${{ github.event.inputs.ksu_branch }} 2>&1 | tee -a ../build.log
              KSU_VER=$(curl -s https://api.github.com/repos/backslashxx/KernelSU/releases/latest | grep '"tag_name":' | sed -E 's/.*"([^"]+)".*/\1/')
              [ -z "$KSU_VER" ] && KSU_VER="v-custom"
              echo "KSU_TAG=KSU-$KSU_VER" >> $GITHUB_ENV
          else
              echo "KSU_TAG=NoKSU" >> $GITHUB_ENV
          fi

          # 3. Setup Environment
          export ARCH=arm64
          export KBUILD_BUILD_HOST=Satori
          export KBUILD_BUILD_USER="dantepaulxd"
          export PATH="${{ github.workspace }}/clang/bin:${PATH}"
          
          # 4. Compile
          make O=out ARCH=arm64 RMX2020_defconfig 2>&1 | tee -a ../build.log
          make -j$(nproc --all) O=out ARCH=arm64 CC="clang" CLANG_TRIPLE=aarch64-linux-gnu- CROSS_COMPILE=aarch64-linux-android- LLVM=1 CONFIG_NO_ERROR_ON_MISMATCH=y 2>&1 | tee -a ../build.log

      - name: Uploading Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Full-Build-Log-${{ env.SHORT_COMMIT }}
          path: build.log

      - name: Prepare AnyKernel3
        if: success()
        run: |
          IMAGE_PATH="kernel-source/out/arch/arm64/boot/Image.gz-dtb"
          OUT_DIR="${{ github.workspace }}/out_assets"
          mkdir -p $OUT_DIR
          
          DATE_STR=$(date +%Y%m%d-%H%M)
          # Result example: KSU-v0.9.5-Satori-16.0-KSU-20260402.zip
          BASE_NAME="${{ env.KSU_TAG }}-${{ env.LV_NAME }}-${{ github.event.inputs.kernel_branch }}-$DATE_STR"
          echo "FINAL_NAME=$BASE_NAME" >> $GITHUB_ENV

          git clone --depth=1 -b ${{ github.event.inputs.ak3_branch }} ${{ github.event.inputs.ak3_source }} AnyKernel
          cp $IMAGE_PATH AnyKernel/
          cd AnyKernel
          zip -r9 ../$BASE_NAME.zip ./*
          cd ..
          mv $BASE_NAME.zip $OUT_DIR/

      - name: Create Release
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Clean source URL to ensure links work
          CLEAN_SOURCE=$(echo "${{ github.event.inputs.kernel_source }}" | sed 's/\.git$//')
          
          gh release create "${{ env.FINAL_NAME }}" --draft \
            --title "${{ env.FINAL_NAME }}" \
            --notes "### Kernel Build Details
            * **Kernel Source:** [${{ github.event.inputs.kernel_branch }}]($CLEAN_SOURCE/tree/${{ github.event.inputs.kernel_branch }})
            * **Latest Commit:** [${{ env.SHORT_COMMIT }}]($CLEAN_SOURCE/commit/${{ env.LATEST_COMMIT }})
            * **KernelSU:** ${{ env.KSU_TAG }}" \
            ${{ github.workspace }}/out_assets/*

      - name: Build Cleanups
        if: always()
        run: |
          rm -rf kernel-source clang AnyKernel out_assets build.log
