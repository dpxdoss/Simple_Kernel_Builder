name: Build Kernel

on:
  workflow_dispatch:
    inputs:
      kernel_source:
        description: 'Kernel Source Link'
        required: true
        default: 'https://github.com/dpxdoss/android_kernel_realme_RMX2020'
      kernel_branch:
        description: 'Kernel Branch'
        required: true
        default: '16.0'
      clang_url:
        description: 'Clang Source (tar.gz or git)'
        required: true
        default: 'https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/tags/android-14.0.0_r50/clang-r510928.tar.gz'
      ksu_source:
        description: 'KernelSU Source (Leave empty to skip)'
        required: false
        default: 'https://raw.githubusercontent.com/backslashxx/KernelSU/refs/heads/master/kernel/setup.sh'
      ak3_source:
        description: 'AnyKernel3 Source'
        required: true
        default: 'https://github.com/sarthakroy2002/AnyKernel3.git'
      output_type:
        description: 'Output Type'
        required: true
        type: choice
        default: 'AnyKernel + Image'
        options:
          - 'AnyKernel (Zip)'
          - 'Raw Kernel (Image.gz-dtb)'
          - 'AnyKernel + Image'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # Fixes the deprecation warning

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Build Dependencies
        run: |
          sudo apt update
          sudo apt install -y git gnupg flex bison build-essential zip curl zlib1g-dev \
          gcc-multilib g++-multilib libc6-dev-i386 libncurses-dev x11proto-core-dev \
          libx11-dev lib32z1-dev libgl1-mesa-dev libxml2-utils xsltproc unzip fontconfig \
          python3 python3-pip libssl-dev bc lua5.3 git-lfs
          sudo ln -sf /usr/bin/python3 /usr/bin/python
          git lfs install

      - name: Clone Kernel Source
        run: |
          git clone --depth=1 -b ${{ github.event.inputs.kernel_branch }} ${{ github.event.inputs.kernel_source }} kernel-source
          echo "LATEST_COMMIT=$(git -C kernel-source rev-parse HEAD)" >> $GITHUB_ENV
          echo "SHORT_COMMIT=$(git -C kernel-source rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Setup Toolchain (Clang)
        run: |
          mkdir -p clang
          if [[ "${{ github.event.inputs.clang_url }}" == *.tar.gz ]]; then
            curl -LO "${{ github.event.inputs.clang_url }}"
            tar -xf *.tar.gz -C clang
          else
            git clone --depth=1 ${{ github.event.inputs.clang_url }} clang
          fi
          [ -d "clang/.git" ] && cd clang && git lfs pull || true

      - name: Build Kernel
        id: build_kernel
        run: |
          cd kernel-source
          
          # 1. Integrate KSU & Get Version
          if [ ! -z "${{ github.event.inputs.ksu_source }}" ]; then
             curl -LSs "${{ github.event.inputs.ksu_source }}" | bash
             KSU_VERSION=$(sed -n 's/.*KERNELSU_VERSION_STR "\(.*\)".*/\1/p' drivers/kernelsu/ksu.h 2>/dev/null || echo "v-custom")
             echo "KSU_TAG=KSU-$KSU_VERSION-" >> $GITHUB_ENV
          else
             echo "KSU_TAG=" >> $GITHUB_ENV
          fi

          # 2. Setup Environment
          export ARCH=arm64
          export KBUILD_BUILD_HOST=Satori
          export KBUILD_BUILD_USER="dantepaulxd"
          export PATH="${{ github.workspace }}/clang/bin:${PATH}"
          
          # 3. Compile
          make O=out ARCH=arm64 RMX2020_defconfig 2>&1 | tee ../build.log
          make -j$(nproc --all) O=out ARCH=arm64 CC="clang" CLANG_TRIPLE=aarch64-linux-gnu- CROSS_COMPILE=aarch64-linux-android- LLVM=1 CONFIG_NO_ERROR_ON_MISMATCH=y 2>&1 | tee -a ../build.log

      - name: Upload Build Log (Always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Full-Build-Log-${{ env.SHORT_COMMIT }}
          path: build.log

      - name: Prepare Artifacts
        if: success()
        run: |
          IMAGE_PATH="kernel-source/out/arch/arm64/boot/Image.gz-dtb"
          OUT_DIR="${{ github.workspace }}/out_assets"
          mkdir -p $OUT_DIR
          
          DATE_STR=$(date +%Y%m%d-%H%M)
          BASE_NAME="${{ env.KSU_TAG }}Satori-${{ github.event.inputs.kernel_branch }}-$DATE_STR"
          echo "FINAL_NAME=$BASE_NAME" >> $GITHUB_ENV

          if [[ "${{ github.event.inputs.output_type }}" == *"Image"* ]]; then
            cp $IMAGE_PATH $OUT_DIR/Image.gz-dtb
          fi

          if [[ "${{ github.event.inputs.output_type }}" == *"AnyKernel"* ]]; then
            git clone --depth=1 ${{ github.event.inputs.ak3_source }} AnyKernel
            cp $IMAGE_PATH AnyKernel/
            cd AnyKernel
            zip -r9 ../$BASE_NAME.zip ./*
            cd ..
            mv $BASE_NAME.zip $OUT_DIR/
          fi

      - name: Create GitHub Release (Draft)
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ env.FINAL_NAME }}" --draft \
            --title "${{ env.FINAL_NAME }}" \
            --notes "### Kernel Build Details
            * **Kernel Source:** [Here](${{ github.event.inputs.kernel_source }})
            * **Latest Commit:** [${{ env.SHORT_COMMIT }}](${{ github.event.inputs.kernel_source }}/commit/${{ env.LATEST_COMMIT }})
            * **Branch:** ${{ github.event.inputs.kernel_branch }}
            * **KernelSU:** ${{ env.KSU_TAG || 'None' }}
            * **AnyKernel3:** ${{ github.event.inputs.ak3_source }}" \
            ${{ github.workspace }}/out_assets/*

      - name: Post-Build Cleanup
        if: always()
        run: |
          rm -rf kernel-source clang AnyKernel out_assets build.log
