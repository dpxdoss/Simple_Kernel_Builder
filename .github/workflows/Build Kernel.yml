name: Build Kernel

on:
  workflow_dispatch:

env:

  KERNEL_SOURCE: "https://github.com/dpxdoss/android_kernel_realme_RMX2020.git"
  KERNEL_BRANCH: "16.0-KSU"

  CLANG_URL: "https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/tags/android-14.0.0_r50/clang-r510928.tar.gz"

  AK3_SOURCE: "https://github.com/dpxdoss/AnyKernel3.git"
  AK3_BRANCH: "RMX2020"

  KSU_SOURCE: "https://raw.githubusercontent.com/backslashxx/KernelSU/refs/heads/master/kernel/setup.sh"
  KSU_BRANCH: "master"

  BUILD_HOST: ReviveMeJett         # Zip Name Prefix
  BUILD_USER: dantepaulxd          # Kernel Builder Name

  USE_LLVM: 1                      # 1 for Clang/LLVM, 0 for GCC
  USE_KSU: true                    # Toggle KernelSU integration
  FETCH_KSU_APK: true              # Download & include KSU Manager APK in release
  NO_ERROR_ON_MISMATCH: y          # Ignore non-critical compiler warnings (y/n)

  POST_AS_DRAFT: true              # true = Draft, false = Public Release
  INCLUDE_DATE: true               # Add date/time suffix to zip name

  EXTRA_MAKE_FLAGS: ""             # Example: "LLVM_IAS=1"

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y git gnupg flex bison build-essential zip curl zlib1g-dev \
          gcc-multilib g++-multilib libc6-dev-i386 libncurses-dev x11proto-core-dev \
          libx11-dev lib32z1-dev libgl1-mesa-dev libxml2-utils xsltproc unzip fontconfig \
          python3 python3-pip libssl-dev bc jq git-lfs
          sudo ln -sf /usr/bin/python3 /usr/bin/python
          git lfs install

      - name: Cloning Kernel
        run: |
          git clone --depth=1 -b ${{ env.KERNEL_BRANCH }} ${{ env.KERNEL_SOURCE }} kernel-source
          echo "LATEST_COMMIT=$(git -C kernel-source rev-parse HEAD)" >> $GITHUB_ENV
          echo "SHORT_COMMIT=$(git -C kernel-source rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Cloning Clang
        run: |
          mkdir -p clang
          if [[ "${{ env.CLANG_URL }}" == *.tar.gz ]]; then
            curl -LO "${{ env.CLANG_URL }}"
            tar -xf *.tar.gz -C clang
          else
            git clone --depth=1 ${{ env.CLANG_URL }} clang
          fi

      - name: Building Kernel
        run: |
          cd kernel-source
          DEFCONFIG=$(ls arch/arm64/configs/ | grep "_defconfig" | head -n 1)
          DEVICE=$(echo $DEFCONFIG | sed 's/_defconfig//')
          echo "DEVICE=$DEVICE" >> $GITHUB_ENV
          echo "DEFCONFIG=$DEFCONFIG" >> $GITHUB_ENV

          if [ "${{ env.USE_KSU }}" = "true" ] && [ ! -z "${{ env.KSU_SOURCE }}" ]; then
              curl -LSs "${{ env.KSU_SOURCE }}" | bash -s ${{ env.KSU_BRANCH }}
              
              if [ -d "drivers/kernelsu" ]; then KSU_TYPE="KernelSU"; KSU_REPO="backslashxx/KernelSU"; 
              elif [ -d "drivers/ksu" ]; then KSU_TYPE="KernelSU-Next"; KSU_REPO="tiann/KernelSU"; 
              else KSU_TYPE="KSU"; KSU_REPO="backslashxx/KernelSU"; fi
              
              KSU_DATA=$(curl -s https://api.github.com/repos/$KSU_REPO/releases/latest)
              KSU_VER=$(echo $KSU_DATA | jq -r .tag_name)
              echo "KSU_INFO=${KSU_TYPE}-${KSU_VER}" >> $GITHUB_ENV
              
              if [ "${{ env.FETCH_KSU_APK }}" = "true" ]; then
                APK_URL=$(echo $KSU_DATA | jq -r '.assets[] | select(.name | contains("apk")) | .browser_download_url' | head -n 1)
                curl -L "$APK_URL" -o "../${KSU_TYPE}_Manager_${KSU_VER}.apk"
              fi
          else
              echo "KSU_INFO=NoKSU" >> $GITHUB_ENV
          fi

          export ARCH=arm64
          export KBUILD_BUILD_HOST=${{ env.BUILD_HOST }}
          export KBUILD_BUILD_USER=${{ env.BUILD_USER }}
          export PATH="${{ github.workspace }}/clang/bin:${PATH}"
          
          make O=out ARCH=arm64 $DEFCONFIG
          make -j$(nproc --all) O=out \
            ARCH=arm64 \
            CC="clang" \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=aarch64-linux-android- \
            LLVM=${{ env.USE_LLVM }} \
            CONFIG_NO_ERROR_ON_MISMATCH=${{ env.NO_ERROR_ON_MISMATCH }} \
            ${{ env.EXTRA_MAKE_FLAGS }}

      - name: Prepare Assets
        if: success()
        run: |
          IMAGE=$(find kernel-source/out/arch/arm64/boot -name "Image.gz*" | head -n 1)
          OUT_DIR="${{ github.workspace }}/out_assets"
          mkdir -p $OUT_DIR
          git clone --depth=1 -b ${{ env.AK3_BRANCH }} ${{ env.AK3_SOURCE }} AnyKernel
          
          [ "${{ env.INCLUDE_DATE }}" = "true" ] && DATE_STR="_$(date +%d%m%y-%H%M)" || DATE_STR=""
          BASE_NAME="${{ env.BUILD_HOST }}_${{ env.KSU_INFO }}_${{ env.DEVICE }}${DATE_STR}"
          echo "FINAL_NAME=$BASE_NAME" >> $GITHUB_ENV

          cp $IMAGE AnyKernel/
          cd AnyKernel
          zip -r9 ../$BASE_NAME.zip ./*
          cd ..
          mv $BASE_NAME.zip $OUT_DIR/
          [ -f *.apk ] && mv *.apk $OUT_DIR/

      - name: Create Release
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          CLEAN_SOURCE=$(echo "${{ env.KERNEL_SOURCE }}" | sed 's/\.git$//')
          DRAFT_FLAG=""
          [ "${{ env.POST_AS_DRAFT }}" = "true" ] && DRAFT_FLAG="--draft"
          
          gh release create "${{ env.FINAL_NAME }}" $DRAFT_FLAG \
            --title "${{ env.FINAL_NAME }}" \
            --notes "### Kernel Build Details
            * **Kernel Name:** ${{ env.BUILD_HOST }}
            * **Device:** ${{ env.DEVICE }}
            * **Source:** [${{ env.KERNEL_BRANCH }}]($CLEAN_SOURCE/tree/${{ env.KERNEL_BRANCH }})
            * **Latest Commit:** [${{ env.SHORT_COMMIT }}]($CLEAN_SOURCE/commit/${{ env.LATEST_COMMIT }})
            * **KSU Status:** ${{ env.KSU_INFO }}" \
            ${{ github.workspace }}/out_assets/*

      - name: Build Cleanups
        if: always()
        run: |
          rm -rf kernel-source clang AnyKernel out_assets
