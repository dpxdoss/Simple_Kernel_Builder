name: Build Kernel

on:
  workflow_dispatch:
    inputs:
      kernel_source:
        description: 'Kernel Source Link'
        required: true
        default: 'https://github.com/dpxdoss/android_kernel_realme_RMX2020.git'
      kernel_branch:
        description: 'Kernel Branch'
        required: true
        default: '16.0-KSU'
      clang_url:
        description: 'Clang Source Link'
        required: true
        default: 'https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/tags/android-14.0.0_r50/clang-r510928.tar.gz'
      ak3_source:
        description: 'AnyKernel Link'
        required: true
        default: 'https://github.com/dpxdoss/AnyKernel3.git'
      ak3_branch:
        description: 'AnyKernel Branch'
        required: true
        default: 'RMX2020'
      ksu_source:
        description: 'KSU Setup Script (KernelSU, Next, etc.)'
        required: false
        default: 'https://raw.githubusercontent.com/backslashxx/KernelSU/refs/heads/master/kernel/setup.sh'
      ksu_branch:
        description: 'KSU Branch'
        required: false
        default: 'master'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y git gnupg flex bison build-essential zip curl zlib1g-dev \
          gcc-multilib g++-multilib libc6-dev-i386 libncurses-dev x11proto-core-dev \
          libx11-dev lib32z1-dev libgl1-mesa-dev libxml2-utils xsltproc unzip fontconfig \
          python3 python3-pip libssl-dev bc jq git-lfs
          sudo ln -sf /usr/bin/python3 /usr/bin/python
          git lfs install

      - name: Cloning Kernel
        run: |
          git clone --depth=1 -b ${{ github.event.inputs.kernel_branch }} ${{ github.event.inputs.kernel_source }} kernel-source
          echo "LATEST_COMMIT=$(git -C kernel-source rev-parse HEAD)" >> $GITHUB_ENV
          echo "SHORT_COMMIT=$(git -C kernel-source rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Cloning Clang
        run: |
          mkdir -p clang
          if [[ "${{ github.event.inputs.clang_url }}" == *.tar.gz ]]; then
            curl -LO "${{ github.event.inputs.clang_url }}"
            tar -xf *.tar.gz -C clang
          else
            git clone --depth=1 ${{ github.event.inputs.clang_url }} clang
          fi

      - name: Building Kernel
        run: |
          cd kernel-source
          
          # 1. Detect Defconfig and Device Name
          # Automatically finds the first file ending in _defconfig
          DEFCONFIG=$(ls arch/arm64/configs/ | grep "_defconfig" | head -n 1)
          DEVICE=$(echo $DEFCONFIG | sed 's/_defconfig//')
          echo "DEVICE=$DEVICE" >> $GITHUB_ENV
          echo "DEFCONFIG=$DEFCONFIG" >> $GITHUB_ENV

          # 2. Extract Kernel Name (CONFIG_LOCALVERSION)
          # Removes quotes and leading hyphens
          LV_NAME=$(grep "CONFIG_LOCALVERSION=" arch/arm64/configs/$DEFCONFIG | cut -d '=' -f2 | tr -d '"' | sed 's/^-//')
          [ -z "$LV_NAME" ] && LV_NAME="Custom"
          echo "LV_NAME=$LV_NAME" >> $GITHUB_ENV

          # 3. KSU Integration & APK Downloader
          if [ ! -z "${{ github.event.inputs.ksu_source }}" ]; then
              curl -LSs "${{ github.event.inputs.ksu_source }}" | bash -s ${{ github.event.inputs.ksu_branch }}
              
              # Identify flavor (Next vs Official)
              if [ -d "drivers/kernelsu" ]; then KSU_TYPE="KernelSU"; KSU_REPO="backslashxx/KernelSU"; 
              elif [ -d "drivers/ksu" ]; then KSU_TYPE="KernelSU-Next"; KSU_REPO="tiann/KernelSU"; 
              else KSU_TYPE="KSU"; KSU_REPO="backslashxx/KernelSU"; fi
              
              # Fetch Manager APK
              KSU_DATA=$(curl -s https://api.github.com/repos/$KSU_REPO/releases/latest)
              KSU_VER=$(echo $KSU_DATA | jq -r .tag_name)
              APK_URL=$(echo $KSU_DATA | jq -r '.assets[] | select(.name | contains("apk")) | .browser_download_url' | head -n 1)
              
              curl -L $APK_URL -o ../${KSU_TYPE}_Manager_${KSU_VER}.apk
              echo "KSU_INFO=${KSU_TYPE}-${KSU_VER}" >> $GITHUB_ENV
          else
              echo "KSU_INFO=NoKSU" >> $GITHUB_ENV
          fi

          # 4. Setup Compilation Env
          export ARCH=arm64
          export KBUILD_BUILD_HOST=Satori
          export KBUILD_BUILD_USER="dantepaulxd"
          export PATH="${{ github.workspace }}/clang/bin:${PATH}"
          
          # 5. Compile
          make O=out ARCH=arm64 $DEFCONFIG
          make -j$(nproc --all) O=out ARCH=arm64 CC="clang" CLANG_TRIPLE=aarch64-linux-gnu- CROSS_COMPILE=aarch64-linux-android- LLVM=1 CONFIG_NO_ERROR_ON_MISMATCH=y

      - name: Prepare Assets
        if: success()
        run: |
          # Find the compiled Image (supports Image.gz-dtb or standard Image.gz)
          IMAGE=$(find kernel-source/out/arch/arm64/boot -name "Image.gz*" | head -n 1)
          OUT_DIR="${{ github.workspace }}/out_assets"
          mkdir -p $OUT_DIR
          
          # Use User-Specific AnyKernel3 from inputs
          git clone --depth=1 -b ${{ github.event.inputs.ak3_branch }} ${{ github.event.inputs.ak3_source }} AnyKernel
          
          DATE_STR=$(date +%Y%m%d-%H%M)
          # Final Name Format: KSU-v1.0-Satori-RMX2020-20260402.zip
          BASE_NAME="${{ env.KSU_INFO }}-${{ env.LV_NAME }}-${{ env.DEVICE }}-$DATE_STR"
          echo "FINAL_NAME=$BASE_NAME" >> $GITHUB_ENV

          cp $IMAGE AnyKernel/
          cd AnyKernel
          zip -r9 ../$BASE_NAME.zip ./*
          cd ..
          
          # Collect assets for release
          mv $BASE_NAME.zip $OUT_DIR/
          [ -f *.apk ] && mv *.apk $OUT_DIR/

      - name: Create Release
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          CLEAN_SOURCE=$(echo "${{ github.event.inputs.kernel_source }}" | sed 's/\.git$//')
          
          gh release create "${{ env.FINAL_NAME }}" --draft \
            --title "${{ env.FINAL_NAME }}" \
            --notes "### Kernel Build Details
            * **Device:** ${{ env.DEVICE }}
            * **Kernel Source:** [${{ github.event.inputs.kernel_branch }}]($CLEAN_SOURCE/tree/${{ github.event.inputs.kernel_branch }})
            * **Latest Commit:** [${{ env.SHORT_COMMIT }}]($CLEAN_SOURCE/commit/${{ env.LATEST_COMMIT }})
            * **KSU Status:** ${{ env.KSU_INFO }}" \
            ${{ github.workspace }}/out_assets/*

      - name: Build Cleanups
        if: always()
        run: |
          rm -rf kernel-source clang AnyKernel out_assets build.log
